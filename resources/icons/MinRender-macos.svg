<?xml version="1.0" encoding="UTF-8"?>
<!--
  macOS Dock tile for MinRender.

  The flat MinRender.svg (gradient mark on transparent) is the canonical
  cross-platform wordmark used for the Windows .ico, in-app embedded
  resources, and any non-tile context. macOS Dock icons follow the HIG
  squircle convention so the app reads uniformly in the Dock — this file
  wraps the gradient mark in a near-black squircle tile so the white-to-
  grey gradient stays visible (it would vanish on a light Dock).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g0" x1="169.46" y1="405.23" x2="342.19" y2="405.23"
                    gradientTransform="translate(0 512) scale(1 -1)"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="1" stop-color="#acacac"/>
    </linearGradient>
    <linearGradient id="g1" x1="281.11" y1="336.11" x2="348.78" y2="268.45"
                    gradientTransform="translate(0 512) scale(1 -1)"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#acacac"/>
      <stop offset=".34" stop-color="#b5b5b6"/>
      <stop offset=".92" stop-color="#ced0d1"/>
      <stop offset="1" stop-color="#d3d5d6"/>
    </linearGradient>
    <linearGradient id="g2" x1="153.94" y1="303.52" x2="241.16" y2="303.52"
                    gradientTransform="translate(0 512) scale(1 -1)"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="1" stop-color="#acacac"/>
    </linearGradient>
    <linearGradient id="g3" x1="39.36" y1="208.13" x2="472.64" y2="208.13"
                    gradientTransform="translate(0 512) scale(1 -1)"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="1" stop-color="#acacac"/>
    </linearGradient>
  </defs>
  <!-- Squircle tile: 824×824 inner bounds with ~185px corner radius
       (matches Big Sur+ tile geometry). #0f0f0f matches the app's
       Theme.qml dark palette. -->
  <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="#0f0f0f"/>
  <!-- New gradient mark, drawn in the source 512×512 coord system and
       scaled up into the squircle. The 1.75× factor + (65,77) offset
       fills ~75% of the squircle inner bounds (164–891 horizontal,
       175–849 vertical out of the 100–924 squircle inset) so the mark
       reads at Dock sizes without crowding the corners. -->
  <g transform="translate(65 77) scale(1.75)">
    <polygon fill="url(#g0)" points="169.46 105.76 256.97 157.28 342.19 108.99 255.85 56.27 169.46 105.76"/>
    <polygon fill="url(#g1)" points="272.49 184.51 272.49 283.07 357.41 234.91 357.41 136.38 272.49 184.51"/>
    <polygon fill="url(#g2)" points="241.16 283.98 241.16 184.34 153.94 132.98 153.94 234.87 241.16 283.98"/>
    <polygon fill="url(#g3)" points="111.83 326.73 256 404.24 397.55 328.03 399.82 441.41 472.64 441.33 472.62 166.33 389.77 202.8 389.77 254.74 256.02 330.47 113.62 251.68 113.62 198.71 39.36 166.56 39.39 441.41 111.83 441.38 111.83 326.73"/>
  </g>
</svg>
